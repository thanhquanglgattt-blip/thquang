<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quang Nguyen Shop</title>

    <!-- CHECK LOGIN NGAY TỪ ĐẦU -->
    <script>
      if (localStorage.getItem("loggedIn") !== "true") {
        window.location.href = "login.html";
      }
    </script>

    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div class="site-frame">

      <!-- HEADER -->
      <header class="site-header">
        <div class="utility-bar">
          <div class="utility-left">
            <a href="#products">New arrivals</a>
            <a href="#about">About</a>
          </div>
          <div class="utility-right">
            <span>VN | EN</span>
            <a href="#contact">Need help?</a>

            <!-- LOGOUT -->
            <a href="#" onclick="logout()">Logout</a>
          </div>
        </div>

        <div class="brand-row">
          <nav class="gender-nav">
            <a href="#products" class="active">Mens</a>
            <a href="#products">Essentials</a>
          </nav>

          <a class="brand-name" href="#">QUANG NGUYEN SHOP</a>

          <div class="header-actions">
            <a href="#products">Search</a>
            <a href="#contact">Wish List (0)</a>
            <a href="#contact">My Bag (0)</a>
          </div>
        </div>
      </header>

      <!-- CONTENT -->
      <main>
        <h1 style="text-align:center; margin-top:100px;">
          Welcome to Quang Nguyen Shop
        </h1>
      </main>

    </div>

    <!-- LOGOUT SCRIPT -->
    <script>
      function logout() {
        localStorage.removeItem("loggedIn");
        window.location.href = "login.html";
      }
    </script>

  </body>
</html>
